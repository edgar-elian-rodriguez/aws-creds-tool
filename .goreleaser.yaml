version: 2
project_name: aws-creds-tool
before:
  hooks:
    - go mod tidy
builds:
  - id: aws-creds-tool
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./main.go
    binary: aws-creds-tool

archives:
  - formats:
      - tar.gz
    files:
      - src: scripts/install{{ if eq .Os "windows" }}.ps1{{ end }}{{ if ne .Os "windows" }}.sh{{ end }}
        strip_parent: true
    # Use standard archive names that are broadly compatible
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip

nfpms:
  - id: aws-creds-tool-deb
    formats:
      - deb
    package_name: aws-creds-tool
    license: MIT
    homepage: https://github.com/edgar-elian-rodriguez/aws-creds-tool
    description: "AWS Credential Administrator"
    maintainer: "edgar-elian-rodriguez"
    vendor: "edgar-elian-rodriguez"
    section: utils
    ids:
      - aws-creds-tool
  - id: aws-creds-tool-rpm
    formats:
      - rpm
    package_name: aws-creds-tool
    license: MIT
    homepage: https://github.com/edgar-elian-rodriguez/aws-creds-tool
    description: "AWS Credential Administrator"
    maintainer: "edgar-elian-rodriguez"
    vendor: "edgar-elian-rodriguez"
    ids:
      - aws-creds-tool

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
